<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilshire Rewind</title>
    <link rel="alternate" type="application/rss+xml" href="feed.xml">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f5f2ec;
            color: #2c2c2c;
            min-height: 100vh;
        }

        header {
            background: #1a1a2e;
            color: #e8e0d0;
            padding: 2.5rem 2rem 1.75rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.4rem;
            letter-spacing: 0.04em;
            font-weight: normal;
        }

        header a {
            color: inherit;
            text-decoration: none;
        }

        header a:hover {
            text-decoration: underline;
        }

        header p {
            margin-top: 0.5rem;
            font-size: 1rem;
            color: #a09880;
            font-style: italic;
        }

        main {
            max-width: 760px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .back {
            display: inline-block;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.82rem;
            color: #6b5c3e;
            text-decoration: none;
            border-bottom: 1px solid #c4b49a;
            padding-bottom: 1px;
            margin-bottom: 2rem;
        }

        .back:hover {
            color: #1a1a2e;
            border-bottom-color: #1a1a2e;
        }

        .sermon-header {
            margin-bottom: 1.75rem;
        }

        .sermon-header h2 {
            font-size: 1.6rem;
            font-weight: normal;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #1a1a2e;
            margin-bottom: 0.25rem;
        }

        .sermon-byline {
            font-size: 0.9rem;
            color: #888;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin-bottom: 0.35rem;
        }

        .sermon-header .duration {
            font-size: 0.85rem;
            color: #999;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        audio {
            width: 100%;
            height: 36px;
            accent-color: #1a1a2e;
            margin-bottom: 1rem;
        }

        .sermon-links {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .sermon-links a {
            font-size: 0.8rem;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #6b5c3e;
            text-decoration: none;
            border-bottom: 1px solid #c4b49a;
            padding-bottom: 1px;
        }

        .sermon-links a:hover {
            color: #1a1a2e;
            border-bottom-color: #1a1a2e;
        }

        .transcript-label {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #888;
            border-bottom: 1px solid #d4cfc7;
            padding-bottom: 0.5rem;
            margin-bottom: 1.75rem;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-weight: normal;
        }

        .transcript {
            font-size: 1rem;
            line-height: 1.85;
            color: #333;
        }

        .transcript p {
            margin-bottom: 1.2em;
        }

        .transcript-notice {
            font-size: 0.82rem;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #888;
            font-style: italic;
            margin-bottom: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 3rem 1rem 2rem;
            font-size: 0.8rem;
            color: #aaa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
    </style>
</head>
<body>

<header>
    <h1><a href="index.html">Wilshire Rewind</a></h1>
    <p>Sermon Archive</p>
</header>

<main id="content">
</main>

<footer>
    <a href="feed.xml" style="color: #aaa; text-decoration: none; border-bottom: 1px solid #ddd8ce; padding-bottom: 1px;">Subscribe via RSS</a>
</footer>

<script src="search.js"></script>
<script>
    const id = new URLSearchParams(location.search).get('id');
    if (!id) location.href = 'index.html';

    Promise.all([
        fetch('sermons.json').then(r => r.json()),
        fetch(`transcriptions/${id}.txt`).then(r => r.text()),
    ]).then(([sermons, rawText]) => {
        const s = sermons.find(s => s.id === id);
        if (!s) { location.href = 'index.html'; return; }

        const title = s.title || 'Unknown title';
        const speaker = s.speaker || 'Unknown speaker';
        document.title = `${title} — Wilshire Rewind`;

        const lines = rawText.trim().split('\n').filter(l => l.trim());
        const paragraphs = [];
        let current = [];
        for (const line of lines) {
            current.push(line.trim());
            if (/[.!?]$/.test(line.trim())) {
                paragraphs.push(current.join(' '));
                current = [];
            }
        }
        if (current.length) paragraphs.push(current.join(' '));
        const transcriptHtml = paragraphs
            .map(p => `<p>${p}</p>`)
            .join('');

        document.getElementById('content').innerHTML = `
            <a class="back" href="index.html">← All sermons</a>
            <div class="sermon-header">
                <h2>${title}</h2>
                <p class="sermon-byline">${[speaker, s.series, s.dateFormatted].filter(Boolean).join(' · ')}</p>
                <span class="duration">${s.durationDisplay}</span>
            </div>
            <audio controls preload="none">
                <source src="${s.audioUrl}" type="audio/mpeg">
            </audio>
            <div class="sermon-links">
                <a href="${s.transcriptUrl}">Download transcript</a>
                <a href="${s.captionsUrl}">Download captions</a>
            </div>
            <h2 class="transcript-label">Transcription</h2>
            <p class="transcript-notice">Please note that transcriptions are machine-generated and may not be accurate.</p>
            <div class="transcript">${transcriptHtml}</div>
        `;
    });
</script>
</body>
</html>
